body:
  text: 天台沙門允堪撰科南山律苑一音重治接後記號初鈔序初題號初標題二撰號二序文初敘教興傳初略歎戒德二別明尼戒初敘昔緣起二斥後訛替二明今撰述初通敘興懷二撰述體勢二鈔文初篇目三示今取用二正文初上卷十五篇二中卷六篇三後偈三下卷九篇初上卷十五篇初標題號二隨篇釋初勸學至十五說戒十五篇如下列初勸學篇初篇目二本文初分門二隨釋初順益初引大乘經論二引小乘律論二違損初引大乘經二引小乘律論三業報初列示二結勸二釋聚篇初篇目二本文初分門二隨釋初正示七聚初波羅夷二僧殘三偷蘭四波逸提五提舍尼六突吉羅七惡說二別簡諸名初略示體同名異二別約名異分釋初從能治行立名初列示二通結二就所詮行立名初標二釋初約因果分對初正明二簡辨二別示受隨義初對論強弱二互攝相通初結前生後二別釋受隨初明受二明隨初總釋名義二分示兩種初標顯二正明初示二持三合結二明二犯三結界篇初篇目二本文初分門初定量二隨釋二大界三戒場二大界初牒名開章二隨章正辨初簡緣二立相初豎標初明標相二示界形二唱相初敘由二識過初外唱過三結斥二內唱過三唱形初明唱人二定初始三正唱相初示相四集僧初明盡集二辨異五辨欲二示別界六作法三戒場初牒名分章二隨章別釋初豎標二立圖初敘意示圖二覆顯三相三釋非三結囑指略四唱結初唱結戒場初示唱相二加羯磨二唱結大界初示唱相二加羯磨五解界初解無場大界二解有場大界初正明解法二通示失否四集眾篇初篇目二本文初分門二隨釋初鳴稚初示緣起二顯功用三教運想四翻梵號五明制度初總明制法二集僧初作法攝二別定打人二自然攝初明可分別三分齊二不可分別初通明分齊二料簡淨穢初自行唯局淨二眾法通淨穢五足數篇初篇目二本文初分門二隨釋初釋眾初通列人數初他部及義加二十三人二本宗二十八人三別示十人二簡辨是非初未言開足二示自言相三避惡離過二簡相初通簡內外二別簡坐立六受欲篇初篇目二本文初分門二隨釋初欲緣初正釋二問答二說法初明與欲法初廣說欲法初正明初自與法二轉與法二問答二略說欲法初通示略法二別問現相二明說欲法初示法二問答初問總說成否二問說欲人多三問睡忘失否四問事訖不來七十戒篇初篇目初釋名二本文二出家三受戒初分門四受衣二隨釋五說淨六捨墮七說戒八安居九受日十自恣初釋名初秉白告眾初緣起二出家初顯功益二秉白二簡聽否二陳詞請師初示請詞三明作法二別料簡三剃髮儀式初莊嚴設座二辭親易服三師為說法三受戒初緣初作白告眾四灌頂讚歎二受法次第五禮佛歸依三示威儀六闍梨剃髮四教問緣七師除頂髮八授衣披著二體九旋繞自慶十辭親受賀十一剃髮時節十二即受歸戒三相初列戒相初正示相二說六念二說功德四受衣初受捨衣法五說淨二受捨鉢法六捨墮七說戒初略指通別二說八安居二因示五德十數初五德九受日三別明式叉對首二十數十自恣初正明自恣初五人已上通別法二四人已下對首法二雜行教示初身口雜行二略示罪相三責罸同利四指略示教八學戒篇初篇目初翻名二本文初分門二乞戒二隨釋三秉法四六法五行法初正示行法初正明初列示三種二總明犯相三廣釋行法二問答初授食開閉初問授法儀軌二眾別行法二問不滿開成初正明不成二別明小年初正明二義斥今非三料簡雜相二問答三遮其妄引九畜眾篇初篇目二本文初分門二隨釋初畜意二制乞初明乞示儀二問和加法十具戒篇初篇目初由藉二本文初分門二本法二隨釋三至僧四戒相初由藉五退捨二本法初牒章分文二隨章正釋有十種如下列初請師初通敘請意初制請意二正明請法二引制緣三列請儀初請師法初請和尚法四出請詞五明答法二請二師法初請羯磨師二請教授師二別料簡初問阿姨名義二揀諸師德臘初揀戒德三問白讀羯磨二揀夏臘二戒緣初緣境初示境初正明二引證二顯德初歎德二結勸二心量初勸發上品三安置二誡令先示四白差初引緣二作法初引律制五出問初示問意二明須解二辨如非三誡委問三明正問初敷座安慰二取衣陶誘三勸令實答六白喚初作白四問十三難二召入五問諸遮事六囑後同答七具儀安立七乞戒初置衣安慰二勸導用心初義準得否三正陳乞詞二正問諸遮八和白三別簡聾人九問難十正受初受前開導初敘由二略示初示境發心初正明二開懷納法二引證二正加羯磨初誡眾靜聽二白四羯磨三至僧初引制即往三別明難緣二問答申義初總標二別列初問僧來尼寺二問寺外結界三問本法何名初總標示四問僧寺作法二列兩釋初明得受五問俗相得否三示正判二明不得六問開別送往七問尼須結界初立理斥非八問安置坐處二結時儀式九問請師儀詞十問正乞戒法初正明乞戒二略示餘法四戒相初正說戒相初八重初約緣顯意二正示八重二四依初顯意二義明餘行三結囑二正示五退捨初捨法次第二對人陳詞三重來可否初正示二傷時十一六念篇初篇目二本文初念知日月初列相顯意二示律別緣二念知食處初不受請法二受請法初無請法三念知夏臘二有請法四念知衣鉢五念同別食初不背法六念身康羸二開背法十二受衣篇初篇目二本文初分門二隨釋有十七門如下列初制聽初先示制意二功能二正明功用初示功用殊勝三釋名初列名標示二誡故意破壞四財如二約義正翻五體如初辨色相六色如二作淨法三示如色七量如初依本律定量二引多論示準初明極小量八條數二別判